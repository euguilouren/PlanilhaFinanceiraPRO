name: Lighthouse CI

# Não bloqueia merges (já era `continue-on-error: true` em quase tudo).
# Rodar sob demanda quando quiser checar performance, ou no cron mensal.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 1 * *'  # Dia 1 de cada mês, 10:00 UTC

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install -g @lhci/cli serve

      - name: Create Lighthouse config
        run: |
          cat > .lighthouserc.json << 'EOF'
          {
            "ci": {
              "collect": {
                "staticDistDir": ".",
                "url": ["http://localhost:3000/index.html"],
                "numberOfRuns": 1,
                "settings": {
                  "chromeFlags": "--no-sandbox --disable-dev-shm-usage"
                }
              },
              "assert": {
                "preset": "lighthouse:no-pwa",
                "assertions": {
                  "categories:performance": ["warn", {"minScore": 0.70}],
                  "categories:accessibility": ["error", {"minScore": 0.80}],
                  "categories:best-practices": ["error", {"minScore": 0.80}],
                  "categories:seo": ["warn", {"minScore": 0.70}]
                }
              },
              "upload": {
                "target": "temporary-public-storage"
              }
            }
          }
          EOF

      - name: Start local server
        run: npx serve . --listen 3000 &
        shell: bash

      - name: Wait for server
        run: |
          for i in $(seq 1 10); do
            curl -s http://localhost:3000/index.html > /dev/null && echo "Server ready" && break
            echo "Waiting for server... attempt $i"
            sleep 2
          done

      - name: Run Lighthouse CI
        run: lhci collect --url=http://localhost:3000/index.html --numberOfRuns=1 --settings.chromeFlags="--no-sandbox --disable-dev-shm-usage"
        continue-on-error: true

      - name: Assert Lighthouse thresholds
        run: lhci assert
        continue-on-error: true

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 7
