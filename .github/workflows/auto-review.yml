name: Revisão Automática de Código (Claude IA)

on:
  schedule:
    # Toda segunda-feira às 08:00 UTC (05:00 BRT)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      criar_pr:
        description: 'Criar PR se bugs forem encontrados?'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  revisar:
    name: Analisar bugs com Claude IA
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install anthropic

      - name: Executar análise de bugs
        id: analise
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/auto_review.py > review_output.txt 2>&1
          cat review_output.txt
          echo "bugs_encontrados=$(grep -c '^\[BUG\]' review_output.txt || true)" >> "$GITHUB_OUTPUT"

      - name: Exibir resumo no job summary
        run: |
          echo "## Revisão Automática — $(date '+%d/%m/%Y')" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat review_output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Verificar se index.html foi modificado
        id: mudancas
        run: |
          if git diff --quiet index.html; then
            echo "modificado=false" >> "$GITHUB_OUTPUT"
          else
            echo "modificado=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Criar branch e PR com os fixes
        if: steps.mudancas.outputs.modificado == 'true' && (github.event.inputs.criar_pr != 'false')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATA=$(date '+%Y-%m-%d')
          BRANCH="claude/auto-fix-${DATA}"
          git config user.name  "Claude Auto-Review"
          git config user.email "claude-bot@noreply.github.com"
          git checkout -b "$BRANCH"
          git add index.html
          git commit -m "fix(auto): correções automáticas detectadas pela IA — ${DATA}"
          git push origin "$BRANCH"
          gh pr create \
            --title "fix(auto): correções automáticas — ${DATA}" \
            --body "$(cat review_output.txt | head -80)" \
            --base main \
            --head "$BRANCH" \
            --label "automated" || true

      - name: Sem alterações necessárias
        if: steps.mudancas.outputs.modificado == 'false'
        run: echo "✅ Nenhum bug encontrado — index.html está limpo."
